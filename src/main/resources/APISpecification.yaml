openapi: 3.0.3
info:
  title: API управления номенклатурой пищевых и биологически активных добавок
  description: Система управления базой данных номенклатуры пищевых добавок и БАД
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Product Types
    description: Управление типами продукции (Пищевая добавка / БАД)
  - name: Product Statuses
    description: Управление статусами продукции (действует / на регистрации / отозван)
  - name: Manufacturers
    description: Управление производителями
  - name: Products
    description: Управление карточками номенклатуры

paths:
  # ==================== Product Types ====================
  /api/product-types:
    get:
      tags:
        - Product Types
      summary: Получить все типы продукции
      operationId: getAllProductTypes
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductType'
    post:
      tags:
        - Product Types
      summary: Создать новый тип продукции
      operationId: createProductType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductType'
      responses:
        '200':
          description: Тип успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductType'

  /api/product-types/{id}:
    get:
      tags:
        - Product Types
      summary: Получить тип продукции по ID
      operationId: getProductTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductType'
        '404':
          description: Тип не найден
    put:
      tags:
        - Product Types
      summary: Обновить тип продукции
      operationId: updateProductType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductType'
      responses:
        '200':
          description: Тип успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductType'
    delete:
      tags:
        - Product Types
      summary: Удалить тип продукции
      operationId: deleteProductType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Тип успешно удален

  # ==================== Product Statuses ====================
  /api/product-statuses:
    get:
      tags:
        - Product Statuses
      summary: Получить все статусы продукции
      operationId: getAllProductStatuses
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductStatus'
    post:
      tags:
        - Product Statuses
      summary: Создать новый статус продукции
      operationId: createProductStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductStatus'
      responses:
        '200':
          description: Статус успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductStatus'

  /api/product-statuses/{id}:
    get:
      tags:
        - Product Statuses
      summary: Получить статус по ID
      operationId: getProductStatusById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductStatus'
        '404':
          description: Статус не найден
    put:
      tags:
        - Product Statuses
      summary: Обновить статус продукции
      operationId: updateProductStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductStatus'
      responses:
        '200':
          description: Статус успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductStatus'
    delete:
      tags:
        - Product Statuses
      summary: Удалить статус продукции
      operationId: deleteProductStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Статус успешно удален

  # ==================== Manufacturers ====================
  /api/manufacturers:
    get:
      tags:
        - Manufacturers
      summary: Получить всех производителей
      operationId: getAllManufacturers
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Manufacturer'
    post:
      tags:
        - Manufacturers
      summary: Создать нового производителя
      operationId: createManufacturer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Manufacturer'
      responses:
        '200':
          description: Производитель успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manufacturer'

  /api/manufacturers/{id}:
    get:
      tags:
        - Manufacturers
      summary: Получить производителя по ID
      operationId: getManufacturerById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manufacturer'
        '404':
          description: Производитель не найден
    put:
      tags:
        - Manufacturers
      summary: Обновить производителя
      operationId: updateManufacturer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Manufacturer'
      responses:
        '200':
          description: Производитель успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manufacturer'
    delete:
      tags:
        - Manufacturers
      summary: Удалить производителя
      operationId: deleteManufacturer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Производитель успешно удален

  # ==================== Products ====================
  /api/products:
    get:
      tags:
        - Products
      summary: Получить все продукты
      operationId: getAllProducts
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      tags:
        - Products
      summary: Создать новый продукт
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '200':
          description: Продукт успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /api/products/{id}:
    get:
      tags:
        - Products
      summary: Получить продукт по ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Продукт не найден
    put:
      tags:
        - Products
      summary: Обновить продукт
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Продукт успешно обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    delete:
      tags:
        - Products
      summary: Удалить продукт
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Продукт успешно удален

components:
  schemas:
    ProductType:
      type: object
      properties:
        id:
          type: integer
        typeName:
          type: string
          description: Название типа (Пищевая добавка / БАД)
        description:
          type: string
          description: Описание типа

    ProductStatus:
      type: object
      properties:
        id:
          type: integer
        statusName:
          type: string
          description: Название статуса (действует / на регистрации / отозван)
        description:
          type: string
          description: Описание статуса

    Manufacturer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Наименование производителя (обязательное)
        country:
          type: string
          description: Страна производства (обязательное)
        legalAddress:
          type: string
          description: Юридический адрес
        inn:
          type: string
          description: ИНН
        ogrn:
          type: string
          description: ОГРН
        contactPhone:
          type: string
          description: Контактный телефон
        contactEmail:
          type: string
          description: Email
        website:
          type: string
          description: Веб-сайт
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductCreateRequest:
      type: object
      required:
        - productName
        - productType
        - status
      properties:
        productName:
          type: string
          description: Наименование продукта (обязательное)
        productType:
          type: object
          required:
            - id
          properties:
            id:
              type: integer
        tnVedCode:
          type: string
          description: Код ТН ВЭД ЕАЭС (необязательное)
        eNumber:
          type: string
          description: E-номер для пищевых добавок (необязательное)
        releaseForm:
          type: string
          description: Форма выпуска (необязательное)
        manufacturers:
          type: array
          description: Список производителей (необязательное)
          items:
            type: object
            required:
              - id
            properties:
              id:
                type: integer
        sgrNumber:
          type: string
          description: Номер СГР (необязательное)
        sgrRegistrationDate:
          type: string
          format: date
          description: Дата регистрации СГР (необязательное)
        shelfLifeMonths:
          type: integer
          description: Срок годности в месяцах (необязательное)
        storageConditions:
          type: string
          description: Условия хранения (необязательное)
        status:
          type: object
          required:
            - id
          properties:
            id:
              type: integer

    ProductUpdateRequest:
      type: object
      properties:
        productName:
          type: string
        productType:
          type: object
          properties:
            id:
              type: integer
        tnVedCode:
          type: string
        eNumber:
          type: string
        releaseForm:
          type: string
        manufacturers:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
        sgrNumber:
          type: string
        sgrRegistrationDate:
          type: string
          format: date
        shelfLifeMonths:
          type: integer
        storageConditions:
          type: string
        status:
          type: object
          properties:
            id:
              type: integer

    Product:
      type: object
      properties:
        id:
          type: integer
        productName:
          type: string
        productType:
          $ref: '#/components/schemas/ProductType'
        tnVedCode:
          type: string
        eNumber:
          type: string
        releaseForm:
          type: string
        manufacturers:
          type: array
          items:
            $ref: '#/components/schemas/Manufacturer'
        sgrNumber:
          type: string
        sgrRegistrationDate:
          type: string
          format: date
        shelfLifeMonths:
          type: integer
        storageConditions:
          type: string
        status:
          $ref: '#/components/schemas/ProductStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time